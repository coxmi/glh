name: release

on:
    push:
        tags:
            - "v*"

jobs:
    publish:
        runs-on: ubuntu-latest
        environment: npm
        container:
            image: mcr.microsoft.com/playwright:v1.58.2-noble
        permissions:
            id-token: write # Required for OIDC
            contents: write # required for zip release
        steps:
            # check out and build
            - uses: actions/checkout@v4
            - name: build and run tests
              run: |
                npm ci
                npm run ci

            # upload diffs if the CI fails
            - name: upload diffs
              if: always()
              uses: actions/upload-artifact@v4
              with:
                name: screenshot-diffs
                path: test/diffs/**/*.png
                if-no-files-found: ignore

            # publish to npm
            - name: publish to npm
              run: |
                npm -v
                npm publish

            # create and publish github release
            - name: install zip
              run: apt-get install -y zip
            - name: create archive
              run: |
                  zip -r release.zip \
                  dist/index.js \
                  dist/index.d.ts \
                  README.md \
                  LICENSE
            - name: github publish release
              uses: softprops/action-gh-release@v2
              with:
                  files: release.zip
                  allowUpdates: true
                  tag_name: ${{ github.ref_name }}